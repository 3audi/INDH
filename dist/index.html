  <style>
    :root {
      /* Light mode: darker green for contrast on white bg */
      --m-green: #004524;
      --scrollbar-track: #F9F7F2;
      /* cream */
    }

    .dark {
      /* Dark mode: lighter green (original color) for contrast on dark bg */
      --m-green: #008744;
      --scrollbar-track: #001E15;
      /* void */
    }

    /* Red texts to #F59E0B in dark mode */
    .dark .text-m-red,

    .dark .text-m-red svg,
    .dark .text-red-500 svg,
    .dark .text-red-600 svg,
    .dark svg.text-m-red,
    .dark svg.text-red-500,
    .dark svg.text-red-600,
    .dark .keep-red,
    html.dark .text-m-red.keep-red {
      color: #C1272D !important;
    }

      width: 6px;

      background: #C1272D;

      background: var(--m-green);
