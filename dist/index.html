  <link rel="icon" href="data:," />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&family=Readex+Pro:wght@160..700&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Readex Pro', 'sans-serif'],
            cairo: ['Cairo', 'sans-serif'],
          },
          colors: {
            void: '#001E15', /* Deep Royal Green - Dark Bg */
            cream: '#F9F7F2', /* Royal Cream - Light Bg */
            'void-lighter': '#002E24', /* Lighter Green */
            'm-red': '#C1272D',
            'm-green': 'var(--m-green)',
            glass: 'rgba(255, 255, 255, 0.03)',
            'glass-hover': 'rgba(255, 255, 255, 0.08)',
            'glass-border': 'rgba(255, 255, 255, 0.15)',
            // Semantic Colors
            'card-dark': '#002E24',
            'card-light': '#FFFFFF',
          },
          animation: {
            'blob': 'blob 10s infinite',
            'spin-slow': 'spin 20s linear infinite',
          },
          keyframes: {
            blob: {
              '0%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
              '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
              '100%': { transform: 'translate(0px, 0px) scale(1)' },
            }
          },
          backgroundImage: {
            'noise': "url('https://grainy-gradients.vercel.app/noise.svg')",
          }
        },
      },
    }
  </script>
  <style>
    :root {
      /* Light mode: darker green for contrast on white bg */
      --m-green: #004524;
    }

    .dark {
      /* Dark mode: lighter green (original color) for contrast on dark bg */
      --m-green: #008744;
    }

    body {
      /* Default to dark, overridden by classes */
      @apply bg-cream text-void dark:bg-void dark:text-white transition-colors duration-500;
      overflow-x: hidden;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      @apply bg-cream dark:bg-void;
    }

    ::-webkit-scrollbar-thumb {
      background: #C1272D;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--m-green);
    }

    .text-glow {
      text-shadow: 0 0 20px rgba(193, 39, 45, 0.4);
    }
  </style>
